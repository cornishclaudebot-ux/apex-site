<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Unsubscribe · Apex</title>
<style>
  :root{ --bg:#06070b; --ink:#f2f4fa; --dim:#9aa0a6; --card:#0d0f16; --line:#1c2030; --ok:#34d399; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--ink); font:16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
        min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:40px 32px; max-width:440px; width:100%; text-align:center; }
  .mark{ font-weight:800; letter-spacing:.35em; font-size:14px; color:var(--dim); margin-bottom:24px; }
  h1{ font-size:22px; margin-bottom:12px; }
  p{ color:var(--dim); margin-bottom:24px; overflow-wrap:anywhere; }
  b{ color:var(--ink); }
  button{ background:var(--ink); color:var(--bg); border:0; border-radius:999px; padding:14px 28px; font-size:16px; font-weight:700; cursor:pointer; width:100%; }
  button:disabled{ opacity:.5; cursor:default; }
  input[type=email]{ width:100%; background:var(--bg); border:1px solid var(--line); border-radius:10px; color:var(--ink);
        padding:12px 14px; font-size:16px; margin-bottom:16px; }
  .done{ display:none; }
  .done h1{ color:var(--ok); }
  .fine{ font-size:13px; margin-top:20px; margin-bottom:0; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">A P E X</div>

    <form id="panel">
      <h1>Unsubscribe</h1>
      <p id="who">Enter the email address you'd like removed from Apex emails.</p>
      <input type="email" id="email" name="email" placeholder="you@business.com" required>
      <button id="btn" type="submit">Unsubscribe</button>
      <p class="fine">You can also reply STOP to any email from us. Requests are honored within 24 hours.</p>
    </form>

    <div class="done" id="done">
      <h1>You're unsubscribed</h1>
      <p id="doneWho">You will not receive any more emails from Apex.</p>
      <p class="fine">Unsubscribed by mistake? Just email <b>audits@apexaz.ai</b>.</p>
    </div>
  </div>

<script>
  var FORM_ENDPOINT = "https://formsubmit.co/ajax/cornishclaudebot@gmail.com";
  var params = new URLSearchParams(location.search);
  var pre = (params.get("e") || "").trim();
  var input = document.getElementById("email");
  var who = document.getElementById("who");

  if (pre) {
    input.value = pre;
    input.style.display = "none";
    who.innerHTML = "Remove <b></b> from all Apex emails?";
    who.querySelector("b").textContent = pre;
  }

  document.getElementById("panel").addEventListener("submit", function (ev) {
    ev.preventDefault();
    var email = input.value.trim();
    if (!email) { input.focus(); return; }
    var btn = document.getElementById("btn");
    btn.disabled = true; btn.textContent = "One moment…";

    fetch(FORM_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify({ email: email, _subject: "UNSUBSCRIBE: " + email, request: "unsubscribe", source: "apexaz.ai/unsubscribe" })
    }).catch(function(){ /* still confirm; mailto fallback below fires only on hard failure */ })
      .then(function(){
        document.getElementById("panel").style.display = "none";
        var d = document.getElementById("done");
        d.style.display = "block";
        document.getElementById("doneWho").innerHTML = "<b></b> will not receive any more emails from Apex.";
        document.getElementById("doneWho").querySelector("b").textContent = email;
      });
  });
</script>
</body>
</html>
