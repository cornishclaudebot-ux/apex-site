<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Apex brain mark">
  <defs>
    <linearGradient id="apexGrad" x1="8" y1="12" x2="56" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#36e0ff"/>
      <stop offset="0.5" stop-color="#8a5cff"/>
      <stop offset="1" stop-color="#ff3d8b"/>
    </linearGradient>
    <radialGradient id="apexCore" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#b9a6ff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8a5cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="apexGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- inner light: the brain lit from within -->
  <ellipse cx="32" cy="30" rx="20" ry="17" fill="url(#apexCore)"/>

  <g filter="url(#apexGlow)">
    <!-- left hemisphere -->
    <path d="M31 15 C27 12.5 22 12.5 20 15.5 C15 13.5 10.5 17.5 12.5 22 C8 23.5 8 30 12.5 31.5 C9 35 12 41 17 40.5 C19.5 45 27 45.5 31 42.5 Z"
      fill="none" stroke="url(#apexGrad)" stroke-width="2.3" stroke-linejoin="round"/>
    <!-- right hemisphere -->
    <path d="M33 15 C37 12.5 42 12.5 44 15.5 C49 13.5 53.5 17.5 51.5 22 C56 23.5 56 30 51.5 31.5 C55 35 52 41 47 40.5 C44.5 45 37 45.5 33 42.5 Z"
      fill="none" stroke="url(#apexGrad)" stroke-width="2.3" stroke-linejoin="round"/>

    <!-- clean fold ridges, mirrored -->
    <path d="M23 21 C26.5 23 26.5 26 23 28" fill="none" stroke="url(#apexGrad)" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
    <path d="M23 32 C26.5 34 26.5 37 23 38.5" fill="none" stroke="url(#apexGrad)" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
    <path d="M41 21 C37.5 23 37.5 26 41 28" fill="none" stroke="url(#apexGrad)" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
    <path d="M41 32 C37.5 34 37.5 37 41 38.5" fill="none" stroke="url(#apexGrad)" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>

    <!-- synapse nodes: the brain, lit up -->
    <circle cx="32" cy="14.5" r="4.6" fill="#8a5cff" opacity="0.3"/>
    <circle cx="32" cy="14.5" r="2.6" fill="#ffffff"/>
    <circle cx="13.5" cy="27" r="2.1" fill="#36e0ff"/>
    <circle cx="50.5" cy="27" r="2.1" fill="#ff3d8b"/>
  </g>
</svg>
