<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="12" y1="14" x2="54" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#36e0ff"/>
      <stop offset=".5" stop-color="#8a5cff"/>
      <stop offset="1" stop-color="#ff3d8b"/>
    </linearGradient>
    <linearGradient id="gf" x1="14" y1="16" x2="52" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#36e0ff" stop-opacity=".12"/>
      <stop offset=".5" stop-color="#8a5cff" stop-opacity=".12"/>
      <stop offset="1" stop-color="#ff3d8b" stop-opacity=".12"/>
    </linearGradient>
  </defs>

  <!-- brain: one closed side-profile, facing right; gentle cortical bumps on the crown,
       cerebellum tucked at the back-bottom, no external appendages -->
  <path d="M16 24.5
    C17.2 18 22.5 13.6 28.5 13.1
    C30.8 11.6 34.2 11.4 36.8 12.6
    C42.5 11.9 48.3 14.9 51 20
    C53.1 23.8 53.6 28.4 52.2 32.4
    C51.1 35.7 48.8 38.4 45.8 40.1
    C44.3 43.4 41 45.6 37.3 45.6
    C35.2 45.6 33.2 44.9 31.6 43.7
    C30.1 45.2 28 46.1 25.7 46.1
    C21.8 46.1 18.4 43.5 17.3 39.9
    C13.9 38 12 34.4 12 30.6
    C12 28.2 13.6 25.9 16 24.5
    Z"
    fill="url(#gf)" stroke="url(#g)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- brain stem -->
  <path d="M28.5 46 C28.1 48.3 26.9 50.2 25 51.5" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>

  <!-- neural network inside: neurons firing -->
  <g stroke="url(#g)" stroke-width="1.7" stroke-linecap="round" opacity=".8">
    <path d="M23 23 L32 18.5"/>
    <path d="M32 18.5 L41.5 22"/>
    <path d="M41.5 22 L46.5 28.5"/>
    <path d="M23 23 L27.5 31.5"/>
    <path d="M32 18.5 L27.5 31.5"/>
    <path d="M41.5 22 L38 32.5"/>
    <path d="M27.5 31.5 L38 32.5"/>
    <path d="M46.5 28.5 L38 32.5"/>
    <path d="M27.5 31.5 L21.5 37.5"/>
    <path d="M38 32.5 L35.5 40"/>
    <path d="M21.5 37.5 L28.5 40.7"/>
    <path d="M28.5 40.7 L35.5 40"/>
  </g>

  <!-- nodes -->
  <circle cx="23" cy="23" r="2.4" fill="#36e0ff"/>
  <circle cx="32" cy="18.5" r="2" fill="#8a5cff"/>
  <circle cx="41.5" cy="22" r="2.4" fill="#8a5cff"/>
  <circle cx="46.5" cy="28.5" r="2" fill="#ff3d8b"/>
  <circle cx="38" cy="32.5" r="2.4" fill="#c74fc6"/>
  <circle cx="21.5" cy="37.5" r="2" fill="#49b6ff"/>
  <circle cx="35.5" cy="40" r="1.9" fill="#ff3d8b"/>
  <circle cx="28.5" cy="40.7" r="1.6" fill="#ff6ba6"/>

  <!-- the firing neuron: bright core + halo ring -->
  <circle cx="27.5" cy="31.5" r="2.9" fill="#ffffff"/>
  <circle cx="27.5" cy="31.5" r="5.4" stroke="#8a5cff" stroke-width="1.4" opacity=".75"/>
</svg>
